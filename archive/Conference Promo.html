<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCOC 2026 Conference | Register Now</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #111111;
    --red: #8B1C1C;
    --red-btn: #A52020;
    --gold: #C9A84C;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Lato', sans-serif;
  }

  .promo {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px;
    text-align: center;
  }

  .promo-logo {
    margin-bottom: 20px;
  }

  .promo-logo img {
    width: 160px;
    height: 160px;
    object-fit: contain;
  }

  .promo-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .promo h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 5vw, 44px);
    font-weight: 900;
    line-height: 1.15;
    color: var(--black);
    margin-bottom: 6px;
  }

  .promo h1 em {
    font-style: normal;
    color: var(--red);
  }

  .promo-sub {
    font-size: 14px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .video-wrap {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
    margin-bottom: 32px;
  }

  .video-wrap video {
    width: 100%;
    display: block;
  }

  .promo-details {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .promo-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 40px;
    padding: 12px 24px;
  }

  .promo-pill-icon { font-size: 16px; }

  .promo-pill-text {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--black);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .btn-register {
    display: inline-block;
    padding: 18px 60px;
    background: var(--red-btn);
    color: var(--white);
    border: 2px solid var(--red);
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
    transition: background 0.2s, transform 0.2s;
  }

  .btn-register:hover {
    background: #C0392B;
    transform: translateY(-2px);
  }

  .tribar {
    display: flex;
    height: 4px;
    width: 160px;
    margin: 32px auto 0;
    border-radius: 2px;
    overflow: hidden;
  }

  .tribar span { flex: 1; }

  @media (max-width: 600px) {
    .promo { padding: 24px 16px; }
    .promo-details { flex-direction: column; align-items: center; }
    .btn-register { width: 100%; max-width: 320px; padding: 16px 24px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="promo">
  <div class="promo-logo">
    <img src="https://static.wixstatic.com/media/1700c8_b909148ce5194ad28a728ce16eecffbb~mv2.png" alt="BCOC Logo">
  </div>
  <div class="promo-eyebrow">Black Chief Officers Committee</div>
  <h1><em>Forging</em> the Future</h1>
  <div class="promo-sub">40th Anniversary Conference &amp; Symposium</div>

  <div class="video-wrap">
    <video id="promoVideo" src="https://video.wixstatic.com/video/a6fc8b_febc5a659fd74dd6b8dfc98ad508686d/1080p/mp4/file.mp4" controls playsinline preload="auto"></video>
  </div>

  <div class="promo-details">
    <div class="promo-pill">
      <span class="promo-pill-icon">📅</span>
      <span class="promo-pill-text">August 2 – 8, 2026</span>
    </div>
    <div class="promo-pill">
      <span class="promo-pill-icon">📍</span>
      <span class="promo-pill-text">Loews Atlanta Hotel</span>
    </div>
    <div class="promo-pill">
      <span class="promo-pill-icon">🏅</span>
      <span class="promo-pill-text">BCOC — Est. 1986</span>
    </div>
  </div>

  <a href="https://www.bcoc.us/conference-registration#registration-page-1" class="btn-register" target="_top">Register Now</a>

  <div class="tribar">
    <span style="background:var(--red)"></span>
    <span style="background:var(--gold)"></span>
    <span style="background:#2E7D52"></span>
  </div>
</div>

<script>
  var video = document.getElementById('promoVideo');
  video.addEventListener('loadedmetadata', function() {
    video.currentTime = 3;
  });
  video.addEventListener('seeked', function() {
    video.pause();
  }, { once: true });
</script>

</body>
</html>
